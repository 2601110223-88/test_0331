</footer>
    </section>

    <script>
      const wrapper = document.querySelector('.image-wrapper');
const prevBtn = document.querySelector('.prev-btn');
const nextBtn = document.querySelector('.next-btn');
const images = document.querySelectorAll('.image-wrapper img');
const totalImages = images.length;

let index = 0;
let autoSlide;

function updateSlider() {
   
    images.forEach(img => img.classList.remove('active'));
    images[index].classList.add('active');

    
    const moveX = index * (80 + 2); 
    wrapper.style.transform = `translateX(-${moveX}%)`;
}


function nextSlide() {
    index = (index < totalImages - 1) ? index + 1 : 0;
    updateSlider();
}

function prevSlide() {
    index = (index > 0) ? index - 1 : totalImages - 1;
    updateSlider();
}


function startAutoSlide() { autoSlide = setInterval(nextSlide, 3000); }
function stopAutoSlide() { clearInterval(autoSlide); startAutoSlide(); }

nextBtn.addEventListener('click', () => { nextSlide(); stopAutoSlide(); });
prevBtn.addEventListener('click', () => { prevSlide(); stopAutoSlide(); });


updateSlider(); 
startAutoSlide();
    </script>
</body>
</html>
